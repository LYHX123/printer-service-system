<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Office Hub — Offline</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f3d2e;
      color: #ffffff;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      max-width: 360px;
      text-align: center;
    }
    .brand {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 14px;
      opacity: 0.75;
      margin-bottom: 28px;
    }
    .message {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .hint {
      font-size: 14px;
      opacity: 0.85;
      line-height: 1.5;
    }
    button {
      margin-top: 28px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      background: transparent;
      color: #ffffff;
      cursor: pointer;
    }
    button:active {
      background: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">OFFICE HUB</div>
    <div class="subtitle">Printer Service Management</div>
    <div class="message">You are currently offline.</div>
    <div class="hint">Please reconnect to continue using the system.</div>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
